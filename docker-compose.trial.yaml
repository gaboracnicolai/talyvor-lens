# docker-compose.trial.yaml — earn-stack trial overlay (operator tooling).
#
# A TEMPLATE used EXPLICITLY, layered on the production compose:
#
#   cp .env.production.example .env
#   echo "LENS_API_KEY=$(openssl rand -hex 32)" >> .env          # gitignored
#   docker compose -f docker-compose.yaml -f docker-compose.trial.yaml up -d
#
# It is intentionally NOT named docker-compose.override.yaml, so it does NOT
# auto-load — a stray trial overlay must never silently flip earning flags on a
# real `docker compose up`. (An operator who wants auto-load keeps their own
# untracked docker-compose.override.yaml.)
#
# DISCIPLINE: this rig is for SYNTHETIC trials with valueless tokens — it
# satisfies NOTHING on the flip-on checklist, which gates real-customer flips.
# See tools/trial/README.md.
#
# Pattern flags are read once at boot (boot-frozen); changing them needs another
# `up -d`.
services:
  lens:
    environment:
      # Admin bootstrap credential — value lives in the gitignored .env
      # (`openssl rand -hex 32`); never inline a key here.
      - LENS_API_KEY=${LENS_API_KEY:?set LENS_API_KEY in .env (openssl rand -hex 32)}
      # The three pattern flags. MINING gates the opt-in route (503 without it);
      # CAPTURE + EARNING gate the two write paths independently.
      - LENS_PATTERN_MINING_ENABLED=true
      - LENS_PATTERN_CAPTURE_ENABLED=true
      - LENS_PATTERN_EARNING_ENABLED=true
      # Low cap so the S2 per-window cap is observable (scenario d).
      - LENS_PATTERN_EARN_CAP_PER_WORKSPACE=3
      - LENS_PATTERN_EARN_CAP_WINDOW=2m
      # Deterministic mock upstream on the compose network (no real provider spend).
      - LENS_VLLM_BASE_URL=http://mockvllm:8000
      # config.Load() presence-checks these; the trial routes only to vLLM/mock.
      - LENS_OPENAI_API_KEY=dummy-openai-unused
      - LENS_ANTHROPIC_API_KEY=dummy-anthropic-unused
      # PR 2a — semantic-isolation scenarios (k/l/m). Points the embedder at the
      # mock's /v1/embeddings (PR 1 #164 made this configurable). NOTE: this
      # ACTIVATES the semantic cache (with the dummy OpenAI key it was inert —
      # every embed 401'd). Pattern scenarios a/b/d/e/f/g use distinct prompts
      # -> non-marker vectors -> semantic MISS -> unaffected; ONLY scenario (c)
      # (a byte-identical replay) now also semantic-caches the first send, so
      # (c) must clear prompt_embeddings alongside FLUSHALL — see README (c).
      # FULL endpoint path (the embedder uses this verbatim, like the OpenAI
      # const https://api.openai.com/v1/embeddings — it does NOT append a path).
      - LENS_EMBEDDING_BASE_URL=http://mockvllm:8000/v1/embeddings
      # Pooled-cache SERVE gate for scenario (m) (the pooled control). The pooled
      # path requires this global switch AND both workspaces' cache_poolable
      # consent (MaybeAllowPooledHit). Neutral to pattern scenarios: none of the
      # pattern workspaces opt into cache_poolable, so DecidePoolableOnWrite stays
      # false for them (no pooled rows, no pooled serves).
      - LENS_CACHE_POOLABLE_ENABLED=true
      # JWT fallback scenario (r) — closes the long-standing (h) gap. TRIAL-ONLY
      # EC P-256 key, supplied from the shell env (NOT committed; see README
      # setup: `export LENS_JWT_PRIVATE_KEY="$(openssl ecparam -genkey -name
      # prime256v1 -noout)"`). Empty -> JWT minting 503s and (r) is skipped,
      # exactly as (h) behaved before.
      - LENS_JWT_PRIVATE_KEY=${LENS_JWT_PRIVATE_KEY:-}
      - LENS_LOG_LEVEL=debug
    depends_on:
      mockvllm:
        condition: service_started

  mockvllm:
    image: python:3.12-alpine
    volumes:
      - ./tools/trial/mock_vllm.py:/mock_vllm.py:ro
    command: ["python3", "/mock_vllm.py"]
    restart: unless-stopped
