name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Throwaway Postgres so the LENS_TEST_DATABASE_URL-gated integration
    # tests (pool-mint-cap exactness + dbmigrate runner) RUN here as standing
    # regression guards instead of skipping. Both tests create their own
    # schema/fixtures and touch disjoint tables — no migration step needed.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: lens_test
          POSTGRES_DB: lens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: go vet
        run: go vet ./...
      - name: go test
        env:
          LENS_TEST_DATABASE_URL: postgres://postgres:lens_test@localhost:5432/lens_test?sslmode=disable
        run: go test -timeout 90s -race -count=1 ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build \
            -ldflags="-w -s" \
            -o bin/lens ./cmd/lens
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: lens-binary
          path: bin/lens
