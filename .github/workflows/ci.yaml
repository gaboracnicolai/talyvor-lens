name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -timeout 90s -race -count=1 ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build \
            -ldflags="-w -s" \
            -o bin/lens ./cmd/lens
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: lens-binary
          path: bin/lens
