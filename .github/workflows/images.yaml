name: Build and push image

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      # migrations are //go:embed-ded into the lens binary — without this
      # path a migrations-only merge never reaches :latest and the image's
      # embedded migration set silently lags the repo (#125 aftermath).
      - 'migrations/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/images.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/talyvor-lens:latest
            ghcr.io/${{ env.OWNER }}/talyvor-lens:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
