# Talyvor Lens — reference PgBouncer configuration.
#
# Used by docker-compose.yaml (bitnami/pgbouncer image reads its own env
# vars instead of this file) and by the Helm chart sidecar when
# pgbouncer.enabled=true.  Copy and adapt for bare-metal / VM deployments.
#
# IMPORTANT: transaction pooling (pool_mode = transaction) requires that
# Lens is started with LENS_DB_PGBOUNCER=true.  This switches pgx to
# simple query protocol; prepared statements do not survive across
# transaction-pooled server connections.

[databases]
# Replace <POSTGRES_HOST> with the real Postgres hostname or IP.
talyvor_lens = host=<POSTGRES_HOST> port=5432 dbname=talyvor_lens

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

# scram-sha-256 is the default for Postgres 16. Use md5 for older servers.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

# transaction: one server connection per transaction — most efficient for
# OLTP.  session mode avoids the simple-protocol requirement but wastes
# server connections on idle clients.
pool_mode = transaction

# Connection ceilings.
max_client_conn    = 1000   ; total client connections across all pools
default_pool_size  = 25     ; server connections per (user, database) pair
min_pool_size      = 2      ; keep N idle server connections warm
reserve_pool_size  = 5      ; extra connections for traffic spikes
reserve_pool_timeout = 3    ; seconds before dipping into reserve pool

# Timeouts (seconds).
server_idle_timeout  = 600  ; reclaim idle server connections after 10 min
server_lifetime      = 3600 ; recycle server connections every hour
client_idle_timeout  = 60   ; disconnect idle clients after 1 min
client_login_timeout = 60   ; login handshake must complete within 60 s

# Logging — keep low in production; raise to 1 for debugging.
log_connections    = 0
log_disconnections = 0
log_pooler_errors  = 1
stats_period       = 60
