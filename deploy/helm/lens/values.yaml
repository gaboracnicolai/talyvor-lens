# Default values for the Talyvor Lens chart.
# Default install = ONE gateway replica, EXTERNAL Postgres/Redis/NATS, secrets
# by reference, migration hook on. Everything advanced is opt-in below.

# -- Number of gateway replicas. Keep at 1 unless HA is enabled (ha.enabled)
# and the deployment is backed by shared Redis (see the HA upgrade).
replicaCount: 1

image:
  # -- Gateway image repository. Published by .github/workflows/images.yaml.
  repository: ghcr.io/talyvor/talyvor-lens
  # -- Image tag. Empty string defaults to the chart appVersion.
  tag: ""
  # -- imagePullPolicy.
  pullPolicy: IfNotPresent

# -- Secrets for pulling private images (list of {name: ...}).
imagePullSecrets: []

# -- Override the chart name / full name if needed.
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Create a dedicated ServiceAccount for the gateway.
  create: true
  # -- Name to use; defaults to the fullname when create is true.
  name: ""
  # -- Annotations (e.g. IRSA / Workload Identity for cloud secret access).
  annotations: {}

# -- Container port the gateway listens on. Must match LENS_LISTEN_ADDR's port.
containerPort: 8080

service:
  # -- Service type. ClusterIP is correct for a gateway behind an Ingress/LB.
  type: ClusterIP
  # -- Service port.
  port: 8080
  # -- Extra service annotations.
  annotations: {}

# -- Resource requests/limits. Sane starting points; tune to your traffic.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

# -- Pod-level security context. Runs as the non-root uid baked into the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context. Read-only root FS (a writable /tmp
# emptyDir is mounted), no privilege escalation, all capabilities dropped.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Liveness/readiness probes. These target the endpoints added by the Lens HA
# work: /livez (pure liveness, always 200 while serving) and /readyz
# (drain-aware readiness). The HA endpoints must be present in the deployed
# image (Lens HA upgrade) for these to succeed.
probes:
  liveness:
    enabled: true
    path: /livez
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    enabled: true
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

# -- Extra pod annotations / labels, node selection, affinity, tolerations.
podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
# -- Topology spread (useful with HA + multiple replicas).
topologySpreadConstraints: []

# Non-secret configuration → rendered into a ConfigMap and injected via envFrom.
# ONLY non-sensitive values belong here; connection strings + keys go in the
# Secret below.
config:
  # -- Address:port the gateway binds (LENS_LISTEN_ADDR). Port must match
  # containerPort.
  listenAddr: "0.0.0.0:8080"
  # -- Log level (LENS_LOG_LEVEL): debug | info | warn | error.
  logLevel: "info"
  # High Availability (LENS_HA_ENABLED + timers). Enabling HA requires Redis
  # (already a Lens dependency) and is what makes >1 replica safe.
  ha:
    enabled: false
    heartbeatSec: 5
    instanceTtlSec: 15
    drainTimeoutSec: 30
  # -- Arbitrary extra NON-SECRET env (map of LENS_* name → value).
  extraEnv: {}

# Secrets. PRODUCTION DEFAULT: reference an existing Secret you created out of
# band (or via External Secrets Operator / Sealed Secrets — see README).
# The Secret must contain these keys (all consumed via envFrom):
#   LENS_DATABASE_URL, LENS_REDIS_URL, LENS_NATS_URL,
#   LENS_OPENAI_API_KEY, LENS_ANTHROPIC_API_KEY
# and optionally: LENS_JWT_SECRET, LENS_GOOGLE_API_KEY, provider keys, etc.
secret:
  # -- Name of a pre-existing Secret to read env from. RECOMMENDED.
  # When empty, the gateway reads from "<release>-lens-env" (which you must
  # create yourself unless secret.create is true).
  existingSecret: ""
  # -- DEV/TEST ONLY: create a Secret from the data below. Never commit real
  # secrets to values. Leave false in production.
  create: false
  # -- DEV/TEST ONLY: key/value pairs to put in the created Secret.
  data: {}
    # LENS_DATABASE_URL: "postgres://lens:lens@postgres:5432/lens?sslmode=disable"
    # LENS_REDIS_URL: "redis://redis:6379/0"
    # LENS_NATS_URL: "nats://nats:4222"
    # LENS_OPENAI_API_KEY: "sk-..."
    # LENS_ANTHROPIC_API_KEY: "sk-ant-..."

# External datastore configuration. Lens does NOT bundle production databases.
# These flags document the embedded (dev-only) option; see README for how to
# enable the Bitnami subcharts. Connection details live in the Secret above.
postgres:
  # -- Use an in-cluster Bitnami Postgres subchart. DEV/TEST ONLY — not wired
  # by default (see README "Embedded databases"). NOT for production.
  embedded: false
redis:
  # -- Use an in-cluster Bitnami Redis subchart. DEV/TEST ONLY. NOT for production.
  embedded: false

# Prometheus metrics. The gateway ALWAYS exposes /metrics; this section only
# controls the optional ServiceMonitor for Prometheus Operator users. Non-
# Operator users scrape /metrics directly — see
# deploy/observability/prometheus/scrape-config.example.yaml.
metrics:
  serviceMonitor:
    # -- Create a ServiceMonitor (requires the Prometheus Operator CRD
    # monitoring.coreos.com/v1). Off by default.
    enabled: false
    # -- Namespace for the ServiceMonitor; empty = the release namespace.
    namespace: ""
    # -- Scrape interval + timeout.
    interval: 30s
    scrapeTimeout: 10s
    # -- Path the gateway serves Prometheus metrics on.
    path: /metrics
    # -- Extra labels so your Prometheus selects this ServiceMonitor, e.g.
    # { release: kube-prometheus-stack }.
    labels: {}

# Database migrations. A pre-install/pre-upgrade Helm hook Job runs BEFORE the
# new gateway pods roll out, so schema is ready before traffic hits new code.
migrations:
  # -- Run the migration hook Job.
  enabled: true
  # -- Image that performs migrations. Empty = the gateway image, which has a
  # built-in `lens migrate` subcommand that applies the embedded SQL.
  image: ""
  # -- Command/args for the migration container. Empty command defaults to the
  # gateway image's `lens migrate`; override to use a different mechanism.
  command: []
  args: []
  # -- Direct Postgres URL for the migration Job ONLY (overrides the Secret's
  # LENS_DATABASE_URL for this Job). Leave UNSET normally. **REQUIRED when
  # pgbouncer.enabled=true**: migrations run DDL and must connect DIRECT to
  # Postgres — a transaction-mode pooler rejects prepared statements and can't
  # safely run multi-statement DDL. The app Deployment keeps using the pooled
  # URL; only migrations go direct.
  databaseURL: ""
  # -- Hook weight (lower runs earlier).
  hookWeight: -5
  # -- Resources for the migration Job.
  resources: {}

# Scheduled Postgres backup CronJob. Runs deploy/backup/scripts/pg_backup.sh
# on a schedule. DEFAULT DISABLED: backups need a real destination +
# credentials, so the chart won't ship a CronJob that runs against nothing.
# The script is NOT vendored into the chart — mount it from a ConfigMap you
# create from the canonical deploy/backup/scripts/ (see README "Scheduled
# backups"); that keeps a single source of truth.
backup:
  # -- Create the backup CronJob.
  enabled: false
  # -- Cron schedule (UTC). Default: daily at 02:00.
  schedule: "0 2 * * *"
  # -- Image with bash + pg_dump/gzip. Stock postgres image is the documented
  # choice (the DR runbook + restore drill use postgres:16).
  image: "postgres:16"
  imagePullPolicy: IfNotPresent
  # -- Which mounted script to run (from the scripts ConfigMap, at /scripts).
  script: "pg_backup.sh"
  # -- Name of a ConfigMap holding the backup script(s). Empty = the derived
  # name "<release>-lens-backup-scripts", which you create from the canonical
  # script: kubectl create configmap <name> --from-file=deploy/backup/scripts/
  scriptConfigMap: ""
  # -- Secret key (in the gateway Secret) mapped to DATABASE_URL for the
  # script. pg_backup.sh reads DATABASE_URL; the Lens secret stores it as
  # LENS_DATABASE_URL.
  databaseUrlKey: "LENS_DATABASE_URL"
  # -- Local dump directory inside the container (BACKUP_DIR). Backed by the
  # storage volume below; the script can also upload to S3 (see env).
  backupDir: "/backups"
  retention:
    # -- Local daily/weekly backups to keep (KEEP_DAILY / KEEP_WEEKLY).
    keepDaily: 7
    keepWeekly: 4
  # -- Extra plain env for the script, e.g. BACKUP_S3_BUCKET, BACKUP_S3_ENDPOINT,
  # BACKUP_S3_PREFIX. Map of NAME → value.
  env: {}
  # -- Extra envFrom entries (e.g. a Secret with S3 credentials). List of
  # {secretRef: {name: ...}} / {configMapRef: {name: ...}}.
  envFrom: []
  # -- Volume backing BACKUP_DIR. Default ephemeral emptyDir (pair with S3
  # upload); set a persistentVolumeClaim for durable local backups.
  storage:
    emptyDir: {}
  # -- CronJob controls.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  backoffLimit: 2
  # -- Resources for the backup container.
  resources: {}

autoscaling:
  # -- HorizontalPodAutoscaler. Only meaningful with config.ha.enabled=true
  # (otherwise scaling replicas of a non-HA gateway over-counts limits, etc.).
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # -- Set to 0 to disable the memory target.
  targetMemoryUtilizationPercentage: 80

pgbouncer:
  # -- Deploy an in-cluster PgBouncer connection pooler in front of Postgres.
  #
  # When enabled, three things happen automatically:
  #   1. A PgBouncer Deployment + ClusterIP Service are created in the release
  #      namespace.  The service is named "<release>-lens-pgbouncer" on port 5432.
  #   2. LENS_DB_PGBOUNCER=true is injected into the gateway ConfigMap, which
  #      switches pgx to simple query protocol (required for transaction pooling).
  #   3. You MUST update your Secret so LENS_DATABASE_URL points at the PgBouncer
  #      service, e.g.:
  #        postgres://lens:<pass>@<release>-lens-pgbouncer:5432/talyvor_lens
  #      AND add a separate key for the Postgres password:
  #        PGBOUNCER_POSTGRES_PASSWORD: <same password>
  #      (PgBouncer reads credentials separately from the connection string.)
  enabled: false
  # -- PgBouncer image. Bitnami's image configures itself from environment
  # variables — no custom config file needed.
  image: "bitnami/pgbouncer:1"
  # -- Port PgBouncer listens on inside the container. The ClusterIP Service
  # always exposes port 5432 → this port so LENS_DATABASE_URL uses :5432.
  listenPort: 6432
  # -- Real Postgres hostname (external cloud DB or in-cluster service).
  postgresHost: ""
  # -- Real Postgres port.
  postgresPort: 5432
  # -- Database name.
  postgresDatabase: "talyvor_lens"
  # -- Database username.
  postgresUsername: "lens"
  # -- Key in the Lens Secret that holds the Postgres password for PgBouncer.
  # Add PGBOUNCER_POSTGRES_PASSWORD to your secret with the same password
  # that appears in LENS_DATABASE_URL.
  postgresPasswordSecretKey: "PGBOUNCER_POSTGRES_PASSWORD"
  # -- Pool mode: transaction (recommended), session, or statement.
  # transaction pooling is most efficient; session avoids the simple-protocol
  # requirement but is less effective under concurrent load.
  poolMode: "transaction"
  # -- Maximum total client connections PgBouncer will accept.
  maxClientConn: 1000
  # -- Server connections per (user, database) pair.
  defaultPoolSize: 25
  # -- Minimum idle server connections kept warm.
  minPoolSize: 2
  # -- PgBouncer container resource requests/limits.
  resources: {}

podDisruptionBudget:
  # -- PodDisruptionBudget for the HA case (keeps a quorum during node drains).
  enabled: false
  # -- Use one of minAvailable / maxUnavailable.
  minAvailable: 1
  maxUnavailable: 0

# Optional in-cluster mining nodes. These are OPERATOR-RUN mining binaries
# (talyvor-node / -cachenode / -embednode), NOT part of a standard gateway
# deploy. Off by default. Each needs its own published image (the default
# gateway image contains only the gateway binary).
nodes:
  # -- Master switch for all node workloads.
  enabled: false
  node:
    enabled: true
    # -- Deployment or DaemonSet.
    kind: Deployment
    replicas: 1
    image:
      repository: ghcr.io/talyvor/talyvor-node
      tag: ""
      pullPolicy: IfNotPresent
    resources: {}
  cachenode:
    enabled: true
    kind: Deployment
    replicas: 1
    image:
      repository: ghcr.io/talyvor/talyvor-cachenode
      tag: ""
      pullPolicy: IfNotPresent
    resources: {}
  embednode:
    enabled: true
    kind: Deployment
    replicas: 1
    image:
      repository: ghcr.io/talyvor/talyvor-embednode
      tag: ""
      pullPolicy: IfNotPresent
    resources: {}
