apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lens.fullname" . }}-config
  labels:
    {{- include "lens.labels" . | nindent 4 }}
data:
  # Non-secret gateway configuration. Connection strings + API keys live in the
  # Secret (see secret.yaml / secret.existingSecret), NOT here.
  LENS_LISTEN_ADDR: {{ .Values.config.listenAddr | quote }}
  LENS_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LENS_HA_ENABLED: {{ .Values.config.ha.enabled | quote }}
  LENS_HA_HEARTBEAT_SEC: {{ .Values.config.ha.heartbeatSec | quote }}
  LENS_HA_INSTANCE_TTL_SEC: {{ .Values.config.ha.instanceTtlSec | quote }}
  LENS_HA_DRAIN_TIMEOUT_SEC: {{ .Values.config.ha.drainTimeoutSec | quote }}
  # Billing (U18b) — FIAT. Stripe SECRETS live in the Secret, never in this ConfigMap.
  LENS_BILLING_ENABLED: {{ .Values.config.billing.enabled | quote }}
  {{- with .Values.config.billing.successUrl }}
  LENS_BILLING_SUCCESS_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.billing.cancelUrl }}
  LENS_BILLING_CANCEL_URL: {{ . | quote }}
  {{- end }}
  {{- if .Values.pgbouncer.enabled }}
  # Injected automatically when pgbouncer.enabled=true: tells pgxpool to use
  # simple query protocol (no prepared statements) for PgBouncer compatibility.
  LENS_DB_PGBOUNCER: "true"
  # When PgBouncer is in front, client connections are cheap — raise the cap.
  LENS_DB_MAX_CONNS: "100"
  {{- end }}
  {{- range $k, $v := .Values.config.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
