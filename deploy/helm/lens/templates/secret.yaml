{{- if .Values.secret.create -}}
# DEV/TEST ONLY. This renders a Secret from secret.data. Never commit real
# secrets to values. In production set secret.existingSecret instead and create
# the Secret out of band (or via External Secrets Operator / Sealed Secrets).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lens.secretName" . }}
  labels:
    {{- include "lens.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
