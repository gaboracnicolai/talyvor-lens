{{- if .Values.migrations.enabled -}}
# Database migration hook. Runs as a pre-install AND pre-upgrade hook so the
# schema is migrated BEFORE new gateway pods roll out (ordering: this Job must
# complete successfully before the Deployment is created/updated).
#
# IMPORTANT: the default Lens gateway image ships neither a `migrate`
# subcommand nor the SQL files, so there is no working default command. You
# MUST set migrations.command to your migration mechanism (a dedicated
# migrations image, a `migrate`/flyway tool, etc.) — see the chart README
# "Migrations". With no command set, this Job intentionally fails closed rather
# than pretend migrations ran. Set migrations.enabled=false to skip entirely.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lens.fullname" . }}-migrate
  labels:
    {{- include "lens.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": {{ .Values.migrations.hookWeight | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "lens.componentSelectorLabels" (list . "migrate") | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "lens.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ .Values.migrations.image | default (include "lens.image" .) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            {{- if .Values.migrations.command }}
            {{- toYaml .Values.migrations.command | nindent 12 }}
            {{- else }}
            - /bin/sh
            - -c
            - >-
              echo 'ERROR: migrations.command is not set. Lens ships no migrate
              subcommand and the SQL is not in the gateway image, so there is no
              safe default. Configure migrations.command (see chart README →
              Migrations) or set migrations.enabled=false.' >&2; exit 1
            {{- end }}
          {{- with .Values.migrations.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "lens.fullname" . }}-config
            - secretRef:
                name: {{ include "lens.secretName" . }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
