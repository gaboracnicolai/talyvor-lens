{{- if .Values.migrations.enabled -}}
# Database migration hook. Runs as a pre-install AND pre-upgrade hook so the
# schema is migrated BEFORE new gateway pods roll out (ordering: this Job must
# complete successfully before the Deployment is created/updated). If the Job
# fails (non-zero exit), Helm fails the install/upgrade — so a server is never
# rolled out against an unmigrated DB.
#
# The default command is the gateway image's own `lens migrate` subcommand,
# which applies the embedded SQL migrations idempotently (tracked in a
# schema_migrations table) using the same LENS_DATABASE_URL the server uses.
# Override migrations.command to use a different mechanism, or set
# migrations.enabled=false to skip the hook entirely and run migrations
# externally.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lens.fullname" . }}-migrate
  labels:
    {{- include "lens.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": {{ .Values.migrations.hookWeight | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "lens.componentSelectorLabels" (list . "migrate") | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "lens.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ .Values.migrations.image | default (include "lens.image" .) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            {{- if .Values.migrations.command }}
            {{- toYaml .Values.migrations.command | nindent 12 }}
            {{- else }}
            # The gateway image's built-in migrator. Applies embedded SQL
            # idempotently; exits non-zero on failure so this hook Job fails
            # and Helm holds back the rollout.
            - /lens
            - migrate
            {{- end }}
          {{- with .Values.migrations.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "lens.fullname" . }}-config
            - secretRef:
                name: {{ include "lens.secretName" . }}
          {{- if .Values.migrations.databaseURL }}
          # Migrations run DDL and MUST connect DIRECT to Postgres — never
          # through a transaction-mode pooler (PgBouncer). A transaction pooler
          # rejects the extended/prepared-statement protocol AND can't safely
          # run multi-statement DDL (BEGIN/COMMIT, partitioning). When PgBouncer
          # is in front (pgbouncer.enabled=true), set migrations.databaseURL to
          # the DIRECT Postgres URL: these explicit env vars override the pooled
          # LENS_DATABASE_URL + inherited LENS_DB_PGBOUNCER for THIS Job only.
          # The app Deployment keeps using the pooler.
          env:
            - name: LENS_DATABASE_URL
              value: {{ .Values.migrations.databaseURL | quote }}
            - name: LENS_DB_PGBOUNCER
              value: "false"
          {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
