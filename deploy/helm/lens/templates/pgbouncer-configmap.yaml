{{- if .Values.pgbouncer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lens.fullname" . }}-pgbouncer
  labels:
    {{- include "lens.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
data:
  POSTGRESQL_HOST: {{ required "pgbouncer.postgresHost is required when pgbouncer.enabled=true" .Values.pgbouncer.postgresHost | quote }}
  POSTGRESQL_PORT: {{ .Values.pgbouncer.postgresPort | quote }}
  POSTGRESQL_DATABASE: {{ .Values.pgbouncer.postgresDatabase | quote }}
  POSTGRESQL_USERNAME: {{ .Values.pgbouncer.postgresUsername | quote }}
  PGBOUNCER_PORT: {{ .Values.pgbouncer.listenPort | quote }}
  PGBOUNCER_POOL_MODE: {{ .Values.pgbouncer.poolMode | quote }}
  PGBOUNCER_MAX_CLIENT_CONN: {{ .Values.pgbouncer.maxClientConn | quote }}
  PGBOUNCER_DEFAULT_POOL_SIZE: {{ .Values.pgbouncer.defaultPoolSize | quote }}
  PGBOUNCER_MIN_POOL_SIZE: {{ .Values.pgbouncer.minPoolSize | quote }}
  PGBOUNCER_SERVER_IDLE_TIMEOUT: "600"
{{- end }}
