# Talyvor Lens — production docker-compose
#
# One-command deploy: `cp .env.production.example .env && docker compose up -d`
# Lens listens on :8080. The dashboard is at /dashboard, the public status
# page is at /status, and the OpenAI-compatible proxy is at /v1/proxy/*.
#
# Image source: defaults to the public registry tag. `docker compose build`
# rebuilds from the local Dockerfile if you want to run unreleased code.

services:
  lens:
    image: ghcr.io/gaboracnicolai/talyvor-lens:latest
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      # Route through PgBouncer (transaction pooling) instead of Postgres directly.
      # LENS_DB_PGBOUNCER switches pgx to simple query protocol (required).
      # LENS_DB_MAX_CONNS is raised — connections are cheap against PgBouncer.
      - LENS_DATABASE_URL=postgres://lens:${POSTGRES_PASSWORD:-changeme}@pgbouncer:6432/talyvor_lens?sslmode=disable
      - LENS_DB_PGBOUNCER=true
      - LENS_DB_MAX_CONNS=100
      - LENS_REDIS_URL=redis://redis:6379
      - LENS_NATS_URL=nats://nats:4222
      - LENS_OPENAI_API_KEY=${LENS_OPENAI_API_KEY:-}
      - LENS_ANTHROPIC_API_KEY=${LENS_ANTHROPIC_API_KEY:-}
      - LENS_GOOGLE_API_KEY=${LENS_GOOGLE_API_KEY:-}
      - LENS_MISTRAL_API_KEY=${LENS_MISTRAL_API_KEY:-}
      - LENS_GROQ_API_KEY=${LENS_GROQ_API_KEY:-}
      - LENS_VLLM_BASE_URL=${LENS_VLLM_BASE_URL:-}
      - LENS_VLLM_API_KEY=${LENS_VLLM_API_KEY:-}
      - LENS_AWS_REGION=${LENS_AWS_REGION:-us-east-1}
      - LENS_AWS_ACCESS_KEY_ID=${LENS_AWS_ACCESS_KEY_ID:-}
      - LENS_AWS_SECRET_ACCESS_KEY=${LENS_AWS_SECRET_ACCESS_KEY:-}
      - LENS_OLLAMA_URL=${LENS_OLLAMA_URL:-}
      - LENS_LOG_LEVEL=${LENS_LOG_LEVEL:-info}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # Container hardening (defense-in-depth). Lens is our own static, non-root
    # (USER lens, uid 65532), CGO-free binary that binds an unprivileged port
    # (8080) and keeps no on-disk state — so it can run fully locked down:
    #   - read_only           root filesystem is immutable; an attacker who gets
    #                          code execution cannot drop a payload or rewrite /lens
    #   - cap_drop: ALL        the process needs zero Linux capabilities
    #   - no-new-privileges    blocks privilege escalation via setuid binaries
    # tmpfs gives the one writable path the runtime may need (temp files); it is
    # ephemeral and noexec so it can't be used to stage an executable.
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Schema migrations run once per compose-up via the gateway image's own
  # `lens migrate` subcommand: embedded SQL, version-tracked in
  # schema_migrations (already-applied versions are skipped — re-running every
  # `up` is a no-op), fail-loud on error. Same mechanism as the Helm migrate
  # hook. Connects DIRECT to Postgres, never through PgBouncer — DDL through a
  # transaction-mode pooler is unsafe.
  #
  # The SQL ships inside the image (migrations/embed.go), so a newly authored
  # migration needs `docker compose build` (or a fresh pull) to be applied.
  #
  # Databases bootstrapped by the OLD psql-loop sidecar have a full schema but
  # an empty schema_migrations — run deploy/migrate-baseline-stamp.sh ONCE
  # before the first `lens migrate` against such a database.
  migrate:
    image: ghcr.io/gaboracnicolai/talyvor-lens:latest
    build:
      context: .
    command: ["migrate"]
    environment:
      LENS_DATABASE_URL: postgres://lens:${POSTGRES_PASSWORD:-changeme}@postgres:5432/talyvor_lens?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    # Safe baseline: block setuid privilege escalation. Not read_only/cap_drop:ALL
    # because psql needs a writable HOME/tmp and this is a short-lived one-shot.
    security_opt:
      - no-new-privileges:true

  # PgBouncer sits between Lens and Postgres and multiplexes many application
  # connections onto a small pool of real server connections. Transaction
  # pooling mode (one server connection per transaction) is the most efficient
  # mode for OLTP workloads and what Lens is tuned for (LENS_DB_PGBOUNCER=true).
  # edoburu/pgbouncer (maintained; the previous bitnami/pgbouncer:1 was purged
  # from Docker Hub in 2025, #126). Its env contract: the [databases] entry key
  # IS DB_NAME, so lens's .../talyvor_lens connection string resolves directly.
  # Two non-obvious defaults are overridden deliberately:
  #   LISTEN_PORT  — image default 5432, we serve on 6432;
  #   AUTH_TYPE    — image default md5, but Postgres 16 stores SCRAM verifiers;
  #                  scram-sha-256 makes the entrypoint keep the plaintext
  #                  password so BOTH legs (client→pgbouncer, pgbouncer→postgres)
  #                  complete SCRAM.
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=talyvor_lens
      - DB_USER=lens
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=25
      - MIN_POOL_SIZE=2
      - SERVER_IDLE_TIMEOUT=600
      # After a Postgres outage PgBouncer caches the failed server login and
      # retries only every server_login_retry seconds (default 15) — measured
      # as ~half of the 33s end-to-end recovery after a DB SIGKILL, and the
      # cached error was twice observed wedging the pooler (issue #174,
      # 2026-06-12 chaos session; second occurrence needed a manual restart).
      # 3s keeps retries cheap while making recovery prompt.
      - SERVER_LOGIN_RETRY=3
    # autoheal opt-in (see the autoheal service): pgbouncer is the one service
    # observed wedging running-but-unhealthy (#174), and a wedged pooler serves
    # nothing — restart is always the right call. Deliberately NOT set on lens:
    # lens reports unhealthy while correctly serving through a DB outage, and
    # auto-restarting it would kill a working gateway.
    labels:
      - autoheal=true
    depends_on:
      postgres:
        condition: service_healthy
    # psql SELECT 1 through the pooler, not pg_isready: it validates the
    # [databases] entry + auth + backend end-to-end (pg_isready counts ANY
    # server response — including "no such database" — as healthy).
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$DB_PASSWORD psql -h 127.0.0.1 -p 6432 -U $$DB_USER -d talyvor_lens -tAc 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Safe baseline only. PgBouncer (Bitnami) renders its config at startup and
    # needs a writable filesystem, so read_only/cap_drop:ALL would break it.
    security_opt:
      - no-new-privileges:true

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: talyvor_lens
      POSTGRES_USER: lens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lens -d talyvor_lens"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Safe baseline only. Postgres needs capabilities for initdb (chown/setuid)
    # and a writable data dir, so read_only/cap_drop:ALL would break startup.
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    # Safe baseline only. Redis persists the append-only file to /data, so a
    # read_only root fs would need extra tmpfs wiring; keep it simple and safe.
    security_opt:
      - no-new-privileges:true

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    # Safe baseline only. JetStream (-js) needs a writable store dir, so keep
    # read_only off here; no-new-privileges is still a free hardening win.
    security_opt:
      - no-new-privileges:true

  # Auto-heal: docker's restart policies fire only on PROCESS DEATH — a
  # running-but-unhealthy container is never restarted by compose (observed
  # live in the #174 chaos session: pgbouncer sat wedged-unhealthy after a DB
  # outage until a human ran `restart pgbouncer`). This sidecar watches Docker
  # health status and restarts containers labeled autoheal=true.
  #
  # Security tradeoff, stated honestly: it mounts the Docker socket, which is
  # root-equivalent control of the host. Standard practice for this pattern,
  # image is pinned, and it runs no exposed ports — but reviewers should be
  # aware this is the one container with host-level power.
  autoheal:
    image: willfarrell/autoheal:1.2.0
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  redisdata:
