# Talyvor Lens — production docker-compose
#
# One-command deploy: `cp .env.production.example .env && docker compose up -d`
# Lens listens on :8080. The dashboard is at /dashboard, the public status
# page is at /status, and the OpenAI-compatible proxy is at /v1/proxy/*.
#
# Image source: defaults to the public registry tag. `docker compose build`
# rebuilds from the local Dockerfile if you want to run unreleased code.

services:
  lens:
    image: ghcr.io/gaboracnicolai/talyvor-lens:latest
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      # Route through PgBouncer (transaction pooling) instead of Postgres directly.
      # LENS_DB_PGBOUNCER switches pgx to simple query protocol (required).
      # LENS_DB_MAX_CONNS is raised — connections are cheap against PgBouncer.
      - LENS_DATABASE_URL=postgres://lens:${POSTGRES_PASSWORD:-changeme}@pgbouncer:6432/talyvor_lens?sslmode=disable
      - LENS_DB_PGBOUNCER=true
      - LENS_DB_MAX_CONNS=100
      - LENS_REDIS_URL=redis://redis:6379
      - LENS_NATS_URL=nats://nats:4222
      - LENS_OPENAI_API_KEY=${LENS_OPENAI_API_KEY:-}
      - LENS_ANTHROPIC_API_KEY=${LENS_ANTHROPIC_API_KEY:-}
      - LENS_GOOGLE_API_KEY=${LENS_GOOGLE_API_KEY:-}
      - LENS_MISTRAL_API_KEY=${LENS_MISTRAL_API_KEY:-}
      - LENS_GROQ_API_KEY=${LENS_GROQ_API_KEY:-}
      - LENS_VLLM_BASE_URL=${LENS_VLLM_BASE_URL:-}
      - LENS_VLLM_API_KEY=${LENS_VLLM_API_KEY:-}
      - LENS_AWS_REGION=${LENS_AWS_REGION:-us-east-1}
      - LENS_AWS_ACCESS_KEY_ID=${LENS_AWS_ACCESS_KEY_ID:-}
      - LENS_AWS_SECRET_ACCESS_KEY=${LENS_AWS_SECRET_ACCESS_KEY:-}
      - LENS_OLLAMA_URL=${LENS_OLLAMA_URL:-}
      - LENS_LOG_LEVEL=${LENS_LOG_LEVEL:-info}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # Container hardening (defense-in-depth). Lens is our own static, non-root
    # (USER lens, uid 65532), CGO-free binary that binds an unprivileged port
    # (8080) and keeps no on-disk state — so it can run fully locked down:
    #   - read_only           root filesystem is immutable; an attacker who gets
    #                          code execution cannot drop a payload or rewrite /lens
    #   - cap_drop: ALL        the process needs zero Linux capabilities
    #   - no-new-privileges    blocks privilege escalation via setuid binaries
    # tmpfs gives the one writable path the runtime may need (temp files); it is
    # ephemeral and noexec so it can't be used to stage an executable.
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Schema migrations run once per compose-up. Uses the postgres image
  # (not the lens binary) since the lens CLI doesn't ship a migrate
  # subcommand — every migration file is idempotent (IF NOT EXISTS),
  # so re-applying on every `up` is safe and predictable.
  migrate:
    image: postgres:16-alpine
    entrypoint: ["sh", "-c"]
    command:
      - >
        for f in /migrations/*.sql; do
          echo "==> Applying $$f";
          psql "$$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$$f" || exit 1;
        done
    environment:
      DATABASE_URL: postgres://lens:${POSTGRES_PASSWORD:-changeme}@postgres:5432/talyvor_lens?sslmode=disable
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    # Safe baseline: block setuid privilege escalation. Not read_only/cap_drop:ALL
    # because psql needs a writable HOME/tmp and this is a short-lived one-shot.
    security_opt:
      - no-new-privileges:true

  # PgBouncer sits between Lens and Postgres and multiplexes many application
  # connections onto a small pool of real server connections. Transaction
  # pooling mode (one server connection per transaction) is the most efficient
  # mode for OLTP workloads and what Lens is tuned for (LENS_DB_PGBOUNCER=true).
  pgbouncer:
    image: bitnami/pgbouncer:1
    environment:
      - POSTGRESQL_HOST=postgres
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_DATABASE=talyvor_lens
      - POSTGRESQL_USERNAME=lens
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PGBOUNCER_PORT=6432
      - PGBOUNCER_POOL_MODE=transaction
      - PGBOUNCER_MAX_CLIENT_CONN=1000
      - PGBOUNCER_DEFAULT_POOL_SIZE=25
      - PGBOUNCER_MIN_POOL_SIZE=2
      - PGBOUNCER_SERVER_IDLE_TIMEOUT=600
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U lens"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Safe baseline only. PgBouncer (Bitnami) renders its config at startup and
    # needs a writable filesystem, so read_only/cap_drop:ALL would break it.
    security_opt:
      - no-new-privileges:true

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: talyvor_lens
      POSTGRES_USER: lens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lens -d talyvor_lens"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Safe baseline only. Postgres needs capabilities for initdb (chown/setuid)
    # and a writable data dir, so read_only/cap_drop:ALL would break startup.
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    # Safe baseline only. Redis persists the append-only file to /data, so a
    # read_only root fs would need extra tmpfs wiring; keep it simple and safe.
    security_opt:
      - no-new-privileges:true

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    # Safe baseline only. JetStream (-js) needs a writable store dir, so keep
    # read_only off here; no-new-privileges is still a free hardening win.
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  redisdata:
